<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexo博客管理</title>
  
  <!-- Netlify CMS CSS -->
  <link rel="stylesheet" href="https://unpkg.com/netlify-cms@^2.0.0/dist/cms.css">
  
  <style>
    /* 重置样式，防止主题干扰 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f5f5;
      overflow-x: hidden;
    }
    
    .header {
      background: #24292e;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 60px;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .logo {
      font-weight: bold;
      font-size: 18px;
    }
    
    .repo-info {
      font-size: 14px;
      opacity: 0.8;
      background: rgba(255,255,255,0.1);
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    .logout-btn {
      background: #cb2431;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .logout-btn:hover {
      background: #b31d28;
    }
    
    .cms-container {
      margin-top: 60px;
      height: calc(100vh - 60px);
    }
    
    /* 隐藏Netlify CMS的默认登录按钮 */
    .nc-githubAuthenticationPage-button {
      display: none !important;
    }
    
    /* 确保CMS容器正确显示 */
    .nc-root {
      height: 100% !important;
    }
    
    /* 修复编辑器样式 */
    .nc-entryEditor-container {
      height: calc(100vh - 120px) !important;
    }
    
    .nc-markdownEditor-container {
      height: 100% !important;
    }
  </style>
  
  <script>
    // 检查token
    const token = localStorage.getItem('github_token');
    if (!token) {
      window.location.href = '/admin/simple-auth.html';
    }
  </script>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">Hexo博客管理</div>
      <div class="repo-info">JohnLinLife/JohnLinLife.github.io</div>
    </div>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </div>
  
  <div class="cms-container" id="cms-root"></div>
  
  <!-- Netlify CMS JS -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  
  <script>
    function logout() {
      localStorage.removeItem('github_token');
      window.location.href = '/admin/simple-auth.html';
    }
    
    // 自定义GitHub认证
    const originalAuthenticate = window.CMS.getBackend('github').authenticate;
    
    window.CMS.getBackend('github').authenticate = function() {
      return Promise.resolve({
        token: token,
        provider: 'github'
      });
    };
    
    // 初始化CMS
    document.addEventListener('DOMContentLoaded', function() {
      const CMS = window.CMS;
      
      // 注册自定义GitHub认证
      const originalBackend = CMS.getBackend('github');
      if (originalBackend) {
        const originalAuthenticate = originalBackend.authenticate;
        originalBackend.authenticate = function() {
          return Promise.resolve({
            token: token,
            provider: 'github'
          });
        };
      }
      
      // 初始化CMS（会自动加载admin/config.yml）
      CMS.init();
      
      // 将CMS渲染到指定容器
      const cmsRoot = document.getElementById('cms-root');
      if (cmsRoot) {
        cmsRoot.appendChild(document.querySelector('.nc-root'));
      }
      
      // 隐藏默认的登录界面
      setTimeout(function() {
        const authPage = document.querySelector('.nc-githubAuthenticationPage-root');
        if (authPage) {
          authPage.style.display = 'none';
        }
        
        // 显示CMS界面
        const cmsInterface = document.querySelector('.nc-app');
        if (cmsInterface) {
          cmsInterface.style.display = 'block';
        }
      }, 100);
    });
  </script>
</body>
</html>
