<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexo博客管理</title>
  
  <!-- Netlify CMS CSS -->
  <link rel="stylesheet" href="https://unpkg.com/netlify-cms@^2.0.0/dist/cms.css">
  
  <style>
    /* 重置样式，防止主题干扰 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f5f5;
      overflow-x: hidden;
    }
    
    .header {
      background: #24292e;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 60px;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .logo {
      font-weight: bold;
      font-size: 18px;
    }
    
    .repo-info {
      font-size: 14px;
      opacity: 0.8;
      background: rgba(255,255,255,0.1);
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    .logout-btn {
      background: #cb2431;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .logout-btn:hover {
      background: #b31d28;
    }
    
    .cms-container {
      margin-top: 60px;
      height: calc(100vh - 60px);
    }
    
    /* 隐藏Netlify CMS的默认登录按钮 */
    .nc-githubAuthenticationPage-button {
      display: none !important;
    }
    
    /* 确保CMS容器正确显示 */
    .nc-root {
      height: 100% !important;
    }
    
    /* 修复编辑器样式 */
    .nc-entryEditor-container {
      height: calc(100vh - 120px) !important;
    }
    
    .nc-markdownEditor-container {
      height: 100% !important;
    }
  </style>
  
  <script>
    // 检查token
    const token = localStorage.getItem('github_token');
    if (!token) {
      window.location.href = '/admin/simple-auth.html';
    }
    
    // 配置Netlify CMS
    const CMS_CONFIG = {
      backend: {
        name: 'github',
        repo: 'JohnLinLife/JohnLinLife.github.io',
        branch: 'main',
        auth_scope: 'repo',
        squash_merges: true,
        cms_label_prefix: 'cms/'
      },
      media_folder: 'source/images',
      public_folder: '/images',
      site_url: 'https://johnlinlife.github.io',
      display_url: 'https://johnlinlife.github.io',
      logo_url: 'https://johnlinlife.github.io/img/avatar.jpg',
      editor: {
        preview: true
      },
      collections: [
        {
          name: 'posts',
          label: '文章',
          label_singular: '文章',
          folder: 'source/_posts',
          create: true,
          delete: true,
          extension: 'md',
          format: 'frontmatter',
          slug: '{{year}}-{{month}}-{{day}}-{{slug}}',
          preview_path: '{{year}}/{{month}}/{{day}}/{{slug}}/',
          fields: [
            { label: '标题', name: 'title', widget: 'string', required: true },
            { label: '发布日期', name: 'date', widget: 'datetime', format: 'YYYY-MM-DD HH:mm:ss', required: true },
            { label: '标签', name: 'tags', widget: 'list', required: false, default: [] },
            { label: '分类', name: 'categories', widget: 'list', required: false, default: [] },
            { label: '置顶', name: 'top', widget: 'boolean', required: false, default: false },
            { label: '摘要', name: 'excerpt', widget: 'text', required: false },
            { label: '封面图', name: 'cover', widget: 'image', required: false },
            { label: '文章内容', name: 'body', widget: 'markdown', required: true }
          ],
          default: {
            layout: 'post',
            date: '{{now}}',
            tags: [],
            categories: []
          }
        }
      ]
    };
  </script>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">Hexo博客管理</div>
      <div class="repo-info">JohnLinLife/JohnLinLife.github.io</div>
    </div>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </div>
  
  <div class="cms-container" id="cms-root"></div>
  
  <!-- Netlify CMS JS -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  
  <script>
    function logout() {
      localStorage.removeItem('github_token');
      window.location.href = '/admin/simple-auth.html';
    }
    
    // 自定义GitHub认证
    const originalAuthenticate = window.CMS.getBackend('github').authenticate;
    
    window.CMS.getBackend('github').authenticate = function() {
      return Promise.resolve({
        token: token,
        provider: 'github'
      });
    };
    
    // 初始化CMS
    document.addEventListener('DOMContentLoaded', function() {
      const CMS = window.CMS;
      
      // 注册自定义后端
      CMS.registerBackend('github', {
        authenticate: function() {
          return Promise.resolve({
            token: token,
            provider: 'github'
          });
        },
        
        // 其他必要的方法
        entries: function() {
          // 实现获取条目列表
          return Promise.resolve([]);
        },
        
        getEntry: function() {
          // 实现获取单个条目
          return Promise.resolve({});
        },
        
        persistEntry: function() {
          // 实现保存条目
          return Promise.resolve();
        }
      });
      
      // 初始化CMS
      CMS.init({ config: CMS_CONFIG });
      
      // 将CMS渲染到指定容器
      const cmsRoot = document.getElementById('cms-root');
      if (cmsRoot) {
        cmsRoot.appendChild(document.querySelector('.nc-root'));
      }
      
      // 隐藏默认的登录界面
      setTimeout(function() {
        const authPage = document.querySelector('.nc-githubAuthenticationPage-root');
        if (authPage) {
          authPage.style.display = 'none';
        }
        
        // 显示CMS界面
        const cmsInterface = document.querySelector('.nc-app');
        if (cmsInterface) {
          cmsInterface.style.display = 'block';
        }
      }, 100);
    });
  </script>
</body>
</html>
