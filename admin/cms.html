<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexo博客管理</title>
  
  <!-- Netlify CMS CSS -->
  <link rel="stylesheet" href="https://unpkg.com/netlify-cms@^2.0.0/dist/cms.css">
  
  <style>
    /* 重置样式，防止主题干扰 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: #f5f5f5;
      overflow-x: hidden;
    }
    
    .header {
      background: #24292e;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      height: 60px;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .logo {
      font-weight: bold;
      font-size: 18px;
    }
    
    .repo-info {
      font-size: 14px;
      opacity: 0.8;
      background: rgba(255,255,255,0.1);
      padding: 4px 8px;
      border-radius: 4px;
    }
    
    .logout-btn {
      background: #cb2431;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .logout-btn:hover {
      background: #b31d28;
    }
    
    .cms-container {
      margin-top: 60px;
      height: calc(100vh - 60px);
    }
    
    /* 确保CMS容器正确显示 */
    .nc-root {
      height: 100% !important;
    }
    
    /* 修复编辑器样式 */
    .nc-entryEditor-container {
      height: calc(100vh - 120px) !important;
    }
    
    .nc-markdownEditor-container {
      height: 100% !important;
    }
    
    /* 隐藏默认的登录按钮 */
    .nc-githubAuthenticationPage-button {
      display: none !important;
    }
    
    /* 显示CMS内容 */
    .nc-app {
      display: block !important;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">Hexo博客管理</div>
      <div class="repo-info">JohnLinLife/JohnLinLife.github.io</div>
    </div>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </div>
  
  <div class="cms-container">
    <!-- Netlify CMS将在这里渲染 -->
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  </div>
  
  <script>
    // 检查token
    const token = localStorage.getItem('github_token');
    if (!token) {
      window.location.href = '/admin/simple-auth.html';
    }
    
    function logout() {
      localStorage.removeItem('github_token');
      window.location.href = '/admin/simple-auth.html';
    }
    
    // 配置Netlify CMS使用自定义认证
    document.addEventListener('DOMContentLoaded', function() {
      const CMS = window.CMS;
      
      // 注册自定义GitHub后端
      CMS.registerBackend('github-custom', {
        authenticate: function() {
          return Promise.resolve({
            token: token,
            provider: 'github'
          });
        },
        
        entries: function() {
          // 使用原始的GitHub后端获取条目
          const originalBackend = CMS.getBackend('github');
          if (originalBackend && originalBackend.entries) {
            return originalBackend.entries.apply(this, arguments);
          }
          return Promise.resolve([]);
        },
        
        getEntry: function() {
          const originalBackend = CMS.getBackend('github');
          if (originalBackend && originalBackend.getEntry) {
            return originalBackend.getEntry.apply(this, arguments);
          }
          return Promise.resolve({});
        },
        
        persistEntry: function() {
          const originalBackend = CMS.getBackend('github');
          if (originalBackend && originalBackend.persistEntry) {
            return originalBackend.persistEntry.apply(this, arguments);
          }
          return Promise.resolve();
        },
        
        persistMedia: function() {
          const originalBackend = CMS.getBackend('github');
          if (originalBackend && originalBackend.persistMedia) {
            return originalBackend.persistMedia.apply(this, arguments);
          }
          return Promise.resolve();
        },
        
        deleteFile: function() {
          const originalBackend = CMS.getBackend('github');
          if (originalBackend && originalBackend.deleteFile) {
            return originalBackend.deleteFile.apply(this, arguments);
          }
          return Promise.resolve();
        }
      });
      
      // 初始化CMS
      CMS.init();
      
      // 设置自定义后端
      setTimeout(function() {
        const config = CMS.getConfig();
        if (config && config.backend) {
          config.backend.name = 'github-custom';
          console.log('使用自定义GitHub后端');
        }
      }, 100);
    });
  </script>
</body>
</html>
